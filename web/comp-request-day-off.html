<div class="btn_box flex">
  <button type="button" class="btn_save btn_add_day_off">등록</button>
  <button type="button" class="btn_cancel">취소</button>
</div>

<!-- 등록폼 -->
<div class="add_day_off_wrap flex">
  <div class="title flex">
    <span><img src="./img/ico-calendar.svg" alt="캘린더" /></span>
    <h6>일정 추가</h6>
  </div>

  <div class="add_day_off">
    <div class="row flex">
      <div class="col flex">
        <label for="category">구분</label>
        <div class="select_box">
          <select name="category" title="구분 선택">
            <option value="1" selected>연차</option>
            <option value="2">반차</option>
            <option value="3">외근</option>
            <option value="4">출장</option>
          </select>
        </div>
      </div>
      <div class="col flex">
        <label for="startDt">시작일</label>
        <input type="date" name="startDt" title="시작일" />
      </div>
      <div class="col flex">
        <label for="endDt">종료일</label>
        <input type="date" name="endDt" title="종료일" />
      </div>
      <div class="col flex">
        <label for="days">기간</label>
        <input type="number" name="days" title="기간" />
      </div>
    </div>
    <div class="row flex">
      <div class="col flex">
        <label for="remark">사유</label>
        <textarea name="remark"></textarea>
      </div>
    </div>
  </div>
</div>
