<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>업무관리</title>
    <link rel="stylesheet" href="./css/comp-style.css" />
    <link rel="stylesheet" href="./css/work.css" />
    <script src="./js/jquery.3.1.1.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/work.js"></script>
  </head>
  <body>
    <!-- 헤더 컴포넌트 -->
    <div id="compHeader"></div>

    <div class="wrap flex">
      <!-- 사이드바 컴포넌트 -->
      <div id="compSidebar"></div>

      <!-- 페이지 내용 -->
      <div id="container" class="flex">
        <!-- 좌 리스트 컴포넌트 -->
        <div id="compLeftList" data-list-src="./data/employee-list.json"></div>

        <!-- 우 내용 -->
        <div class="contants">
          <!-- 텝 컴포넌트 -->
          <div id="compTab" data-tab-src="./data/work.json"></div>

          <!-- 탭 내용 -->
          <div class="tab_content_wrap">
            <!-- 일일업무 -->
            <div id="compTab01" class="tab_content" data-tab-content="01"></div>

            <!-- 일정관리 -->
            <div id="compTab02" class="tab_content" data-tab-content="02"></div>

            <!-- 운행일지 -->
            <div id="compTab03" class="tab_content" data-tab-content="03"></div>

            <!-- 채권관리 -->
            <div id="compTab04" class="tab_content" data-tab-content="04"></div>
          </div>
        </div>

        <!-- 팝업 -->
        <div id="compPopupBizList"></div>
      </div>
    </div>

    <!-- 푸터 컴포넌트 -->
    <div id="compFooter"></div>
  </body>
</html>
